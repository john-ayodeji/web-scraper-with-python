<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crawler Control Center</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>

    <main class="layout">
      <section class="hero card">
        <h1>Crawler Control Center</h1>
        <p>Live scheduler, status stream, JSON report, and graph preview.</p>
        <div class="status-row">
          <span id="statusDot" class="status-dot idle"></span>
          <span id="statusText">Idle</span>
        </div>
      </section>

      <section class="metrics card">
        <h2>Live Metrics</h2>
        <div class="metric-grid">
          <article>
            <h3>Pages</h3>
            <p id="metricPages">0</p>
          </article>
          <article>
            <h3>Internal Links</h3>
            <p id="metricInternal">0</p>
          </article>
          <article>
            <h3>External Links</h3>
            <p id="metricExternal">0</p>
          </article>
          <article>
            <h3>Last Run</h3>
            <p id="metricLastRun">never</p>
          </article>
        </div>
        <p id="errorText" class="error"></p>
      </section>

      <section class="controls card">
        <h2>Controls</h2>
        <form id="settingsForm" class="form-grid">
          <label>URL<input id="url" name="url" required /></label>
          <label>Max Concurrency<input id="max_concurrency" name="max_concurrency" type="number" min="1" required /></label>
          <label>Max Pages<input id="max_pages" name="max_pages" type="number" min="1" required /></label>
          <label>Interval Minutes<input id="interval_minutes" name="interval_minutes" type="number" min="1" required /></label>
          <label>Request Timeout<input id="request_timeout" name="request_timeout" type="number" min="3" required /></label>
          <label>Max Retries<input id="max_retries" name="max_retries" type="number" min="0" required /></label>
          <label>Resend API Key<input id="resend_api_key" name="resend_api_key" /></label>
          <label>Email To<input id="email_to" name="email_to" type="email" /></label>
          <label>Email From<input id="resend_from" name="resend_from" /></label>
          <label class="checkbox-row"><input id="send_email" name="send_email" type="checkbox" />Send email updates</label>

          <div class="actions">
            <button id="saveBtn" type="submit">Save Settings</button>
            <button id="runBtn" type="button" class="secondary">Run Now</button>
          </div>
        </form>
      </section>

      <section class="visuals card">
        <h2>Graph Preview</h2>
        <img id="graphImage" src="/api/report-graph" alt="Graph report preview" />
      </section>

      <section class="gallery card">
        <h2>Image Preview</h2>
        <div id="imageGrid" class="image-grid"></div>
      </section>

      <section class="json card">
        <h2>JSON Preview</h2>
        <pre id="jsonPreview">No report yet.</pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
